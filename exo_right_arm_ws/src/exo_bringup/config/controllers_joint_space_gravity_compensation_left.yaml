controller_manager:
  ros__parameters:
    update_rate: 500
    thread_priority: 80

    left_joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    left_joint_space_gravity_compensation_controller:
      type: gravity_compensation_controller/JointSpaceGravityCompensationController

left_joint_state_broadcaster:
  ros__parameters:
    joints:
      - left_revolute_1
      - left_revolute_2
      - left_revolute_3
    interfaces:
      - position
      - velocity
      - effort
    use_local_topics: true

left_joint_space_gravity_compensation_controller:
  ros__parameters:
    joints:
      - left_revolute_1
      - left_revolute_2
      - left_revolute_3
    dynamics_backend: pinocchio
    urdf_path: ""
    dynamics_urdf_filename: exo_dynamics_left.urdf
    reference_trajectory_topic: /left/reference_trajectory
    kp: 5.0
    kd: 1.0
    gravity_scale: 1.0
    publish_telemetry: true
    telemetry_topic: /left/joint_space_gravity_compensation_controller/telemetry
    logging_session_topic: /left/joint_space_gravity_compensation_controller/logging/session
