controller_manager:
  ros__parameters:
    update_rate: 500
    thread_priority: 80

    left_joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    left_smc_controller:
      type: smc_controller/SmcController

left_joint_state_broadcaster:
  ros__parameters:
    joints:
      - left_revolute_1
      - left_revolute_2
      - left_revolute_3
    interfaces:
      - position
      - velocity
      - effort
    use_local_topics: true

left_smc_controller:
  ros__parameters:
    joints:
      - left_revolute_1
      - left_revolute_2
      - left_revolute_3
    dynamics_backend: pinocchio
    urdf_path: ""
    dynamics_urdf_filename: exo_dynamics_left.urdf
    reference_trajectory_topic: /left/reference_trajectory
    lambda: 10.0
    k_switch: 5.0
    k_p: 10.0
    phi: 100.0
    publish_telemetry: true
    telemetry_topic: /left/smc_controller/telemetry
    logging_session_topic: /left/smc_controller/logging/session
    imu_topic: /left/imu
