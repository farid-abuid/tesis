controller_manager:
  ros__parameters:
    update_rate: 500
    thread_priority: 80

    right_joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    right_task_space_gravity_compensation_controller:
      type: gravity_compensation_controller/TaskSpaceGravityCompensationController

right_joint_state_broadcaster:
  ros__parameters:
    joints:
      - right_revolute_1
      - right_revolute_2
      - right_revolute_3
    interfaces:
      - position
      - velocity
      - effort
    use_local_topics: true

right_task_space_gravity_compensation_controller:
  ros__parameters:
    joints:
      - right_revolute_1
      - right_revolute_2
      - right_revolute_3
    dynamics_backend: pinocchio
    urdf_path: ""
    dynamics_urdf_filename: exo_dynamics_right.urdf
    reference_trajectory_topic: /right/reference_trajectory
    end_effector_frame: right_Componente5_v1_1
    kp: 50.0
    kd: 5.0
    gravity_scale: 1.0
    publish_telemetry: true
    telemetry_topic: /right/task_space_gravity_compensation_controller/telemetry
    logging_session_topic: /right/task_space_gravity_compensation_controller/logging/session
