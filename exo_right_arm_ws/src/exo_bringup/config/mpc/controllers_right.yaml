controller_manager:
  ros__parameters:
    update_rate: 500
    thread_priority: 80

    right_joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    right_mpc_controller:
      type: mpc_controller/MpcController

right_joint_state_broadcaster:
  ros__parameters:
    joints:
      - right_revolute_1
      - right_revolute_2
      - right_revolute_3
    interfaces:
      - position
      - velocity
      - effort
    use_local_topics: true

right_mpc_controller:
  ros__parameters:
    joints:
      - right_revolute_1
      - right_revolute_2
      - right_revolute_3
    dynamics_backend: pinocchio
    urdf_path: ""
    dynamics_urdf_filename: exo_dynamics_right.urdf
    reference_trajectory_topic: /right/reference_trajectory
    # MPC horizon (steps). Gain is precomputed once at on_configure.
    horizon: 10
    # Prediction timestep (s): should match 1/update_rate for accuracy
    dt: 0.002
    # State cost diagonal — position tracking weight
    q_cost: 100.0
    # State cost diagonal — velocity tracking weight
    dq_cost: 1.0
    # Control effort weight
    u_cost: 0.01
    publish_telemetry: true
    telemetry_topic: /right/mpc_controller/telemetry
    logging_session_topic: /right/mpc_controller/logging/session
    imu_topic: /right/imu
