controller_manager:
  ros__parameters:
    update_rate: 500
    thread_priority: 80

    right_joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    right_mrac_controller:
      type: mrac_controller/MracController

right_joint_state_broadcaster:
  ros__parameters:
    joints:
      - right_revolute_1
      - right_revolute_2
      - right_revolute_3
    interfaces:
      - position
      - velocity
      - effort
    use_local_topics: true

right_mrac_controller:
  ros__parameters:
    joints:
      - right_revolute_1
      - right_revolute_2
      - right_revolute_3
    dynamics_backend: pinocchio
    urdf_path: ""
    dynamics_urdf_filename: exo_dynamics_right.urdf
    reference_trajectory_topic: /right/reference_trajectory
    # Reference model: second-order response q̈_m = ω²(q_des-q_m) - 2ζω·q̇_m
    omega_m: 5.0    # natural frequency (rad/s)
    zeta_m: 0.9     # damping ratio
    # Composite error slope Λ (used for q̇_r = q̇_m - Λ·e)
    lambda: 5.0
    # Velocity error feedback gain Kv
    kv: 20.0
    # Adaptation gain Γ: higher → faster convergence, less robustness to noise
    gamma: 0.5
    publish_telemetry: true
    telemetry_topic: /right/mrac_controller/telemetry
    logging_session_topic: /right/mrac_controller/logging/session
    imu_topic: /right/imu
