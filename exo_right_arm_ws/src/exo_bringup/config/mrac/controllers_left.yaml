controller_manager:
  ros__parameters:
    update_rate: 500
    thread_priority: 80

    left_joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    left_mrac_controller:
      type: mrac_controller/MracController

left_joint_state_broadcaster:
  ros__parameters:
    joints:
      - left_revolute_1
      - left_revolute_2
      - left_revolute_3
    interfaces:
      - position
      - velocity
      - effort
    use_local_topics: true

left_mrac_controller:
  ros__parameters:
    joints:
      - left_revolute_1
      - left_revolute_2
      - left_revolute_3
    dynamics_backend: pinocchio
    urdf_path: ""
    dynamics_urdf_filename: exo_dynamics_left.urdf
    reference_trajectory_topic: /left/reference_trajectory
    omega_m: 5.0
    zeta_m: 0.9
    lambda: 5.0
    kv: 20.0
    gamma: 0.5
    publish_telemetry: true
    telemetry_topic: /left/mrac_controller/telemetry
    logging_session_topic: /left/mrac_controller/logging/session
    imu_topic: /left/imu
