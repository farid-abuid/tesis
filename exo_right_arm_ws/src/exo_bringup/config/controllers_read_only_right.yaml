controller_manager:
  ros__parameters:
    update_rate: 500
    thread_priority: 80

    right_joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

right_joint_state_broadcaster:
  ros__parameters:
    joints:
      - right_revolute_1
      - right_revolute_2
      - right_revolute_3
    interfaces:
      - position
      - velocity
      - effort
    use_local_topics: true
